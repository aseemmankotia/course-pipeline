<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechNuggets Academy — Course Pipeline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Top navigation ─────────────────────────────────────────────────────── -->
  <nav class="topbar">
    <a class="brand" href="#">
      <div class="brand-dot"></div>
      <div class="brand-name">
        TechNuggets Academy
        <span>by Aseem</span>
      </div>
    </a>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="curriculum">📚 Curriculum</button>
      <button class="tab-btn"        data-tab="chapters">✏️ Chapters</button>
      <button class="tab-btn"        data-tab="render">🎬 Render</button>
      <button class="tab-btn"        data-tab="publish">📤 Publish</button>
      <button class="tab-btn"        data-tab="marketing">📈 Marketing</button>
      <button class="tab-btn"        data-tab="materials">📚 Materials</button>
      <button class="tab-btn"        data-tab="settings">⚙️ Settings</button>
    </div>
    <span id="aiCostDisplay"
      style="font-size:0.75rem;color:var(--muted,#888);padding:3px 10px;
             background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
             border-radius:6px;white-space:nowrap;margin-left:12px;"
      title="Session AI cost (Anthropic + Gemini)">AI: $0.0000</span>
  </nav>

  <!-- ── Tab panels ─────────────────────────────────────────────────────────── -->
  <main class="main-content">

    <div id="tab-curriculum" class="tab-panel active"></div>
    <div id="tab-chapters"   class="tab-panel"></div>
    <div id="tab-render"     class="tab-panel"></div>
    <div id="tab-publish"    class="tab-panel"></div>
    <div id="tab-marketing"  class="tab-panel"></div>
    <div id="tab-materials"  class="tab-panel"></div>
    <div id="tab-settings"   class="tab-panel"></div>

  </main>

  <script src="js/ai-client.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
